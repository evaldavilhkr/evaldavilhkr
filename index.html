<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy Web App | Sign Up</title>
    <style>
        /* প্রিমিয়াম ডার্ক থিম স্টাইল */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #0a0a0a; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

        .container {
            width: 100%; max-width: 400px; padding: 30px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #d4af37; /* আপনার পছন্দমতো গোল্ডেন বর্ডার */
            border-radius: 20px; backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            text-align: center;
        }

        h2 { color: #d4af37; margin-bottom: 25px; letter-spacing: 1px; }

        input {
            width: 100%; padding: 12px; margin: 10px 0;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 10px; color: #fff; outline: none;
        }

        input:focus { border-color: #d4af37; }

        .btn {
            width: 100%; padding: 12px; border: none; border-radius: 10px;
            font-weight: bold; cursor: pointer; transition: 0.3s;
            margin-top: 15px; text-transform: uppercase;
        }

        .btn-gold { background: linear-gradient(45deg, #d4af37, #f9e29c); color: #000; }
        .btn-verify { background: #28a745; color: #fff; display: none; }

        #otp-box { display: none; margin-top: 20px; border-top: 1px dashed #444; padding-top: 20px; }
        #recaptcha-container { margin-top: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>CREATE ACCOUNT</h2>
        
        <div id="setup-fields">
            <input type="email" id="email" placeholder="Gmail Address">
            <input type="tel" id="phone" placeholder="+8801XXXXXXXXX">
            <input type="password" id="password" placeholder="Password (min 6 chars)">
            
            <div id="recaptcha-container"></div>
            
            <button class="btn btn-gold" id="send-otp-btn">Get Verification Code</button>
        </div>

        <div id="otp-box">
            <p style="font-size: 14px; color: #aaa; margin-bottom: 10px;">আপনার ফোনে পাঠানো ৬ ডিজিটের কোড দিন</p>
            <input type="text" id="otp-input" placeholder="X X X X X X" style="text-align: center; letter-spacing: 5px;">
            <button class="btn btn-verify" id="verify-otp-btn" style="display: block;">Verify & Sign Up</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, RecaptchaVerifier, signInWithPhoneNumber, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // আপনার প্রজেক্ট কনফিগ
        const firebaseConfig = {
            apiKey: "AIzaSyChG38Jq4soYwSj4qyBje45ZrrD8DcPclk",
            authDomain: "easy-50e2d.firebaseapp.com",
            databaseURL: "https://easy-50e2d-default-rtdb.firebaseio.com",
            projectId: "easy-50e2d",
            storageBucket: "easy-50e2d.firebasestorage.app",
            messagingSenderId: "137085905024",
            appId: "1:137085905024:web:2195237879f0d644a35e65",
            measurementId: "G-WT28EDD9N8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // ১. reCAPTCHA ভেরিফায়ার সেটআপ
        window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
            'size': 'normal' // আপনি চাইলে 'invisible' করতে পারেন
        });

        // ২. OTP পাঠানোর ফাংশন
        document.getElementById('send-otp-btn').addEventListener('click', async () => {
            const phoneNumber = document.getElementById('phone').value;
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;

            if(!phoneNumber.startsWith("+880") || email === "" || pass.length < 6) {
                alert("সঠিকভাবে সব তথ্য দিন (পাসওয়ার্ড অন্তত ৬ অক্ষর হতে হবে)");
                return;
            }

            try {
                const appVerifier = window.recaptchaVerifier;
                const confirmationResult = await signInWithPhoneNumber(auth, phoneNumber, appVerifier);
                window.confirmationResult = confirmationResult;
                
                // তথ্য সেভ রাখা
                window.tempData = { email, pass };

                document.getElementById('setup-fields').style.opacity = "0.3";
                document.getElementById('setup-fields').style.pointerEvents = "none";
                document.getElementById('otp-box').style.display = "block";
                alert("আপনার ফোনে কোড পাঠানো হয়েছে!");
            } catch (error) {
                console.error(error);
                alert("SMS পাঠানো সম্ভব হয়নি। দয়া করে নম্বর চেক করুন বা পরে চেষ্টা করুন।");
            }
        });

        // ৩. OTP যাচাই ও একাউন্ট তৈরি
        document.getElementById('verify-otp-btn').addEventListener('click', async () => {
            const code = document.getElementById('otp-input').value;
            try {
                // প্রথমে ফোন ভেরিফাই হবে
                await window.confirmationResult.confirm(code);
                
                // ফোন ভেরিফাই হলে ইমেইল দিয়ে ফায়ারবেস একাউন্ট তৈরি হবে
                await createUserWithEmailAndPassword(auth, window.tempData.email, window.tempData.pass);
                
                alert("অভিনন্দন Ritom! আপনার একাউন্ট সফলভাবে তৈরি হয়েছে।");
                // এখানে আপনি ড্যাশবোর্ড পেজের লিঙ্ক দিতে পারেন
                // window.location.href = "dashboard.html"; 
            } catch (error) {
                console.error(error);
                alert("ভুল কোড! আবার চেষ্টা করুন।");
            }
        });
    </script>
</body>
</html>
