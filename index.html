<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy App | Login & Signup</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #0a0a0a; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 350px; padding: 30px; background: rgba(255,255,255,0.05); border: 1px solid #d4af37; border-radius: 20px; text-align: center; }
        h2 { color: #d4af37; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; border-radius: 10px; color: #fff; outline: none; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; text-transform: uppercase; }
        .btn-gold { background: linear-gradient(45deg, #d4af37, #f9e29c); color: #000; }
        .switch-btn { margin-top: 15px; font-size: 13px; color: #aaa; cursor: pointer; }
        #login-form { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <div id="signup-form">
            <h2>SIGN UP</h2>
            <input type="text" id="reg-name" placeholder="Full Name">
            <input type="email" id="reg-email" placeholder="Email Address">
            <input type="tel" id="reg-phone" placeholder="Phone Number">
            <input type="password" id="reg-pass" placeholder="Password (min 6 chars)">
            <button class="btn btn-gold" onclick="handleSignup()">Create Account</button>
            <p class="switch-btn" onclick="toggleForm('login')">Already have an account? Login</p>
        </div>

        <div id="login-form">
            <h2>LOGIN</h2>
            <input type="email" id="login-email" placeholder="Email Address">
            <input type="password" id="login-pass" placeholder="Password">
            <button class="btn btn-gold" onclick="handleLogin()">Login Now</button>
            <p class="switch-btn" onclick="toggleForm('signup')">New here? Sign Up</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyChG38Jq4soYwSj4qyBje45ZrrD8DcPclk",
            authDomain: "easy-50e2d.firebaseapp.com",
            projectId: "easy-50e2d",
            storageBucket: "easy-50e2d.firebasestorage.app",
            messagingSenderId: "137085905024",
            appId: "1:137085905024:web:2195237879f0d644a35e65"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ফর্ম পরিবর্তন করার ফাংশন
        window.toggleForm = (type) => {
            document.getElementById('signup-form').style.display = type === 'signup' ? 'block' : 'none';
            document.getElementById('login-form').style.display = type === 'login' ? 'block' : 'none';
        }

        // সাইন আপ লজিক
        window.handleSignup = async () => {
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const phone = document.getElementById('reg-phone').value;
            const pass = document.getElementById('reg-pass').value;

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
                const user = userCredential.user;

                // ডাটাবেজে ইউজারের তথ্য সেভ করা (যাতে পরে ব্যবহার করা যায়)
                await setDoc(doc(db, "users", user.uid), {
                    fullName: name,
                    email: email,
                    phoneNumber: phone,
                    createdAt: new Date()
                });

                alert("Account created successfully!");
                // এখানে ড্যাশবোর্ডে পাঠানোর কোড লিখুন
            } catch (error) {
                alert("Error: " + error.message);
            }
        };

        // লগইন লজিক
        window.handleLogin = async () => {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;

            try {
                await signInWithEmailAndPassword(auth, email, pass);
                alert("Login successful! Welcome back.");
                // ড্যাশবোর্ডে রিডাইরেক্ট
            } catch (error) {
                alert("Invalid Email or Password!");
            }
        };
    </script>
</body>
</html>
