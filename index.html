<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy Web App | Sign Up</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #0a0a0a; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

        .container {
            width: 100%; max-width: 400px; padding: 30px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #d4af37;
            border-radius: 20px; backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            text-align: center;
        }

        h2 { color: #d4af37; margin-bottom: 25px; }

        .input-box { position: relative; margin: 15px 0; }
        
        input {
            width: 100%; padding: 12px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 10px; color: #fff; outline: none;
        }

        /* পাসওয়ার্ড টগল বাটন */
        .toggle-password {
            position: absolute; right: 10px; top: 50%;
            transform: translateY(-50%); cursor: pointer;
            color: #d4af37; font-size: 14px;
        }

        .btn {
            width: 100%; padding: 12px; border: none; border-radius: 10px;
            font-weight: bold; cursor: pointer; transition: 0.3s;
            margin-top: 15px; text-transform: uppercase;
        }

        .btn-gold { background: linear-gradient(45deg, #d4af37, #f9e29c); color: #000; }
        #otp-box { display: none; margin-top: 20px; border-top: 1px dashed #444; padding-top: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>CREATE ACCOUNT</h2>
        
        <div id="setup-fields">
            <div class="input-box">
                <input type="email" id="email" placeholder="Gmail Address">
            </div>
            
            <div class="input-box">
                <input type="tel" id="phone" placeholder="01XXXXXXXXX">
            </div>

            <div class="input-box">
                <input type="password" id="password" placeholder="Password (min 6 chars)">
                <span class="toggle-password" onclick="togglePass()">SHOW</span>
            </div>
            
            <div id="recaptcha-container"></div>
            
            <button class="btn btn-gold" id="send-otp-btn">Get Verification Code</button>
        </div>

        <div id="otp-box">
            <p style="font-size: 14px; color: #aaa; margin-bottom: 10px;">আপনার ফোনে পাঠানো কোডটি দিন</p>
            <input type="text" id="otp-input" placeholder="OTP Code" style="text-align: center;">
            <button class="btn btn-gold" id="verify-otp-btn" style="background: #28a745; color: #fff;">Verify & Sign Up</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, RecaptchaVerifier, signInWithPhoneNumber, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // আপনার ফায়ারবেস কনফিগ
        const firebaseConfig = {
            apiKey: "AIzaSyChG38Jq4soYwSj4qyBje45ZrrD8DcPclk",
            authDomain: "easy-50e2d.firebaseapp.com",
            databaseURL: "https://easy-50e2d-default-rtdb.firebaseio.com",
            projectId: "easy-50e2d",
            storageBucket: "easy-50e2d.firebasestorage.app",
            messagingSenderId: "137085905024",
            appId: "1:137085905024:web:2195237879f0d644a35e65",
            measurementId: "G-WT28EDD9N8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // পাসওয়ার্ড ভিউ টগল ফাংশন
        window.togglePass = () => {
            const passInput = document.getElementById('password');
            const toggleText = document.querySelector('.toggle-password');
            if (passInput.type === "password") {
                passInput.type = "text";
                toggleText.innerText = "HIDE";
            } else {
                passInput.type = "password";
                toggleText.innerText = "SHOW";
            }
        };

        window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', { 'size': 'invisible' });

        document.getElementById('send-otp-btn').addEventListener('click', async () => {
            let phone = document.getElementById('phone').value.trim();
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value;

            // নম্বর অটো ফরম্যাট করা
            if(phone.startsWith("0")) { phone = "+88" + phone; }

            if(email === "" || pass.length < 6 || phone.length < 13) {
                alert("দয়া করে সঠিক জিমেইল এবং ১১ ডিজিটের ফোন নম্বর দিন।");
                return;
            }

            try {
                const appVerifier = window.recaptchaVerifier;
                const confirmationResult = await signInWithPhoneNumber(auth, phone, appVerifier);
                window.confirmationResult = confirmationResult;
                window.tempData = { email, pass };

                document.getElementById('setup-fields').style.display = "none";
                document.getElementById('otp-box').style.display = "block";
                alert("আপনার নম্বরে SMS পাঠানো হয়েছে!");
            } catch (error) {
                alert("এরর: " + error.message);
            }
        });

        document.getElementById('verify-otp-btn').addEventListener('click', async () => {
            const code = document.getElementById('otp-input').value;
            try {
                await window.confirmationResult.confirm(code);
                await createUserWithEmailAndPassword(auth, window.tempData.email, window.tempData.pass);
                alert("অভিনন্দন! একাউন্ট সফলভাবে তৈরি হয়েছে।");
                location.reload(); 
            } catch (error) {
                alert("ভুল কোড বা টেকনিক্যাল সমস্যা!");
            }
        });
    </script>
</body>
</html>
